<!DOCTYPE html>
<html lang="en" data-theme="noir">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSaga — Stories that evolve together.</title>
    <meta name="description" content="An open-source, community-governed collaborative universe-building platform. Create worlds. Define canon. Govern together.">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* ═══════════════════════════════════════════
         OpenSaga Theme System: Noir & Paper
         ═══════════════════════════════════════════ */

      [data-theme="noir"] {
        --surface-base: #09090B;
        --surface-elevated: #141414;
        --surface-overlay: #1E1E1E;
        --surface-subtle: #282828;
        --accent-primary: #FFFFFF;
        --accent-hover: #D4D4D8;
        --accent-muted: rgba(255, 255, 255, 0.05);
        --text-primary: #FAFAFA;
        --text-secondary: #A3A3A3;
        --text-tertiary: #525252;
        --border-default: #1E1E1E;
        --border-subtle: #282828;
        --border-accent: rgba(255, 255, 255, 0.12);
      }

      [data-theme="paper"] {
        --surface-base: #F5F5F0;
        --surface-elevated: #FFFFFF;
        --surface-overlay: #E8E8E3;
        --surface-subtle: #DCDCD7;
        --accent-primary: #09090B;
        --accent-hover: #3F3F46;
        --accent-muted: rgba(9, 9, 11, 0.04);
        --text-primary: #1A1A1A;
        --text-secondary: #6B6B6B;
        --text-tertiary: #9CA3AF;
        --border-default: #E0E0DB;
        --border-subtle: #D4D4CF;
        --border-accent: rgba(9, 9, 11, 0.1);
      }

      body {
        background-color: var(--surface-base);
        color: var(--text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      ::selection {
        background-color: var(--accent-muted);
        color: var(--text-primary);
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      html { scroll-behavior: smooth; }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              serif: ['Instrument Serif', 'Georgia', 'serif'],
            },
            colors: {
              surface: {
                base: 'var(--surface-base)',
                elevated: 'var(--surface-elevated)',
                overlay: 'var(--surface-overlay)',
                subtle: 'var(--surface-subtle)',
              },
              accent: {
                primary: 'var(--accent-primary)',
                hover: 'var(--accent-hover)',
                muted: 'var(--accent-muted)',
              },
              text: {
                primary: 'var(--text-primary)',
                secondary: 'var(--text-secondary)',
                tertiary: 'var(--text-tertiary)',
              },
              status: {
                canon: '#4ADE80',
                proposal: '#A3A3A3',
                rejected: '#F87171',
                draft: '#525252',
              },
              border: {
                DEFAULT: 'var(--border-default)',
                subtle: 'var(--border-subtle)',
                accent: 'var(--border-accent)',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'breathe': 'breathe 4s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(16px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              breathe: {
                '0%, 100%': { opacity: '0.4' },
                '50%': { opacity: '0.7' },
              }
            }
          }
        }
      }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
