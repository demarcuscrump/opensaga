name: Bug Report
description: Report a reproducible OpenSaga bug.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenSaga. Do not include secrets, real user data, or vulnerability details here. Use SECURITY.md for security reports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Running Mode
      options:
        - Demo/offline mode
        - Supabase configured mode
        - Production deployment
        - Unsure
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome 125 on macOS 15
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Screenshots
      description: Remove secrets before posting.
      render: shell
