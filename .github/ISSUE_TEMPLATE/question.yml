name: Question
description: Ask a project question that may help future contributors.
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you already tried or read?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Local setup
        - Supabase setup
        - Deployment
        - Creator Studio
        - Governance
        - AI/BYOK
        - Contributing
        - Other
